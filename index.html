<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Court IT Asset Allotment Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --brand: #2563eb;
            --brand-dark: #1e3a8a;
            --brand-light: #eff6ff;
            --surface: #ffffff;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: #cbd5e1;
            --danger: #ef4444;
            --success: #10b981;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 12px;
            box-sizing: border-box;
        }

        .entry-card {
            background: var(--surface);
            max-width: 600px;
            margin: 0 auto 30px auto;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .header h2 {
            margin: 0;
            font-size: 1.15rem;
            color: var(--brand-dark);
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .status-connected { background: #d1fae5; color: #065f46; }
        .status-connected .status-dot { background: #10b981; }
        .status-syncing { background: #fef3c7; color: #92400e; }
        .status-syncing .status-dot { background: #f59e0b; animation: pulse 1s infinite alternate; }

        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }

        .form-group { margin-bottom: 14px; }
        .form-group label { 
            display: block; 
            font-size: 0.75rem; 
            font-weight: 800; 
            color: var(--text-sub); 
            text-transform: uppercase; 
            margin-bottom: 6px; 
        }

        .form-group input, .form-group select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 0.95rem; 
            font-family: inherit; 
            background: #ffffff; 
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media(max-width: 480px) { .grid-2 { grid-template-columns: 1fr; } }

        .section-box {
            background: #f1f5f9;
            padding: 14px;
            border-radius: 12px;
            margin: 14px 0;
            border: 1px solid var(--border);
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--brand-dark);
            text-transform: uppercase;
            display: block;
            margin-bottom: 10px;
        }

        .device-row { 
            background: #ffffff; 
            border: 1.5px solid var(--border); 
            padding: 14px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            position: relative; 
        }

        .remove-device-btn { 
            position: absolute; 
            right: 12px; 
            top: 12px; 
            color: var(--danger); 
            cursor: pointer; 
            font-size: 1rem; 
        }

        .btn { 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 800; 
            font-size: 0.95rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            width: 100%;
        }

        .btn-primary { background: var(--brand); color: white; }
        .btn-add { background: var(--brand-light); color: var(--brand); border: 1px dashed var(--brand); padding: 10px; }

        .duplicate-error {
            border-color: var(--danger) !important;
            background-color: #fef2f2 !important;
        }
    </style>
</head>
<body>

<!-- 🔍 DATALISTS FOR AUTO-FETCH SUGGESTIONS -->
<datalist id="listDesignations"></datalist>
<datalist id="listMakes"></datalist>
<datalist id="listModels"></datalist>
<datalist id="listSerials"></datalist> <!-- 👈 Added Serial Number Datalist -->

<div class="entry-card">
    
    <div class="header">
        <h2><i class="fa-solid fa-laptop-medical"></i> Hardware Allotment</h2>
        <div id="connectionStatus" class="status-indicator status-syncing">
            <span class="status-dot"></span> <span id="statusText">Connecting...</span>
        </div>
    </div>

    <div class="form-group">
        <label><i class="fa-solid fa-gavel"></i> Select Court Jurisdiction *</label>
        <select id="inputCourt">
            <option value="">-- Choose Court --</option>
        </select>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>Staff Name *</label>
            <input type="text" id="inputStaff" placeholder="e.g. Midhun P">
        </div>
        <div class="form-group">
            <label>Designation / Seat *</label>
            <input type="text" id="inputDesig" list="listDesignations" placeholder="Select Designation...">
        </div>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>Installation Date</label>
            <input type="date" id="inputInstallDate">
        </div>
        <div class="form-group">
            <label>High Court OM No.</label>
            <input type="text" id="inputOmNo" placeholder="e.g. HC/OM/2026/102">
        </div>
    </div>

    <div class="section-box">
        <span class="section-title"><i class="fa-solid fa-shield-halved"></i> Warranty / AMC Dates (Optional)</span>
        <div class="grid-2">
            <div class="form-group"><label>Warranty Start</label><input type="date" id="inputWStart"></div>
            <div class="form-group"><label>Warranty End</label><input type="date" id="inputWEnd"></div>
        </div>
        <div class="grid-2">
            <div class="form-group"><label>AMC Start</label><input type="date" id="inputAmcStart"></div>
            <div class="form-group"><label>AMC End</label><input type="date" id="inputAmcEnd"></div>
        </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin: 15px 0 10px 0;">
        <span class="section-title" style="margin:0;"><i class="fa-solid fa-hard-drive"></i> Hardware Devices List</span>
    </div>

    <div id="devicesContainer"></div>

    <button type="button" class="btn btn-add" style="margin-bottom: 20px;" onclick="addDeviceRow()">
        <i class="fa-solid fa-plus"></i> Add Another Device
    </button>

    <button class="btn btn-primary" onclick="saveAssetEntry()">
        <i class="fa-solid fa-paper-plane"></i> Submit & Save Allotment
    </button>

</div>

<script>
    const apiURL = 'https://script.google.com/macros/s/AKfycbzAgmvDfO_qJDRWkWf1YzRtiMkEz7jqHHgJ5ZrOzJnOMNeGcV8PTzBCSpXL0KpNEE0e/exec';

    const defaultCourts = [
        { id: 'Jfcm1', name: 'JFCM Court - I, Kozhikode' },
        { id: 'Jfcm6', name: 'JFCM Court - VI, Kozhikode' },
        { id: 'Adc', name: 'Additional District Court' },
        { id: 'Subcourt', name: 'Sub Court, Kozhikode' }
    ];

    let existingSerials = new Set();

    window.onload = function() {
        populateCourtDropdown(defaultCourts);
        addDeviceRow();
        loadMasterData();
    };

    function updateConnectionStatus(status, text) {
        const badge = document.getElementById('connectionStatus');
        const txt = document.getElementById('statusText');
        if(!badge || !txt) return;
        badge.className = 'status-indicator status-' + status;
        txt.innerText = text;
    }

    function jsonpFetch(url) {
        return new Promise((resolve) => {
            const callbackName = 'jp_cb_' + Math.round(100000 * Math.random());
            window[callbackName] = function(data) {
                delete window[callbackName];
                if(document.getElementById(callbackName)) document.body.removeChild(document.getElementById(callbackName));
                resolve(data);
            };
            const script = document.createElement('script');
            script.id = callbackName;
            script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
            script.onerror = function() {
                delete window[callbackName];
                if(document.getElementById(callbackName)) document.body.removeChild(document.getElementById(callbackName));
                resolve(null);
            };
            document.body.appendChild(script);
        });
    }

    function postToScript(payload) {
        fetch(apiURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        }).catch(err => console.error("Sync error:", err));
    }

    function populateCourtDropdown(courts) {
        const ddl = document.getElementById('inputCourt');
        ddl.innerHTML = '<option value="">-- Select Court Jurisdiction --</option>';
        courts.forEach(c => {
            ddl.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        });
    }

    async function loadMasterData() {
        updateConnectionStatus('syncing', 'Syncing Data...');
        try {
            const data = await jsonpFetch(`${apiURL}?action=getAllData`);
            if(data) {
                if(data.courtsList && data.courtsList.length > 0) populateCourtDropdown(data.courtsList);
                
                // 🔍 POPULATE MASTER DATALISTS
                if(data.master) {
                    populateDatalist('listDesignations', data.master.designations);
                    populateDatalist('listMakes', data.master.makes);
                    populateDatalist('listModels', data.master.models);
                    populateDatalist('listSerials', data.master.serials); // 👈 Automatically fetches serial numbers from Master Sheet
                }

                existingSerials.clear();
                if(data.courtsData) {
                    Object.keys(data.courtsData).forEach(cId => {
                        const assets = data.courtsData[cId].assets || [];
                        const ewaste = data.courtsData[cId].ewaste || [];
                        assets.forEach(a => { if(a[3]) existingSerials.add(String(a[3]).toUpperCase().trim()); });
                        ewaste.forEach(e => { if(e[2]) existingSerials.add(String(e[2]).toUpperCase().trim()); });
                    });
                }
                updateConnectionStatus('connected', 'Ready');
            }
        } catch(e) {
            updateConnectionStatus('offline', 'Offline Mode');
        }
    }

    function populateDatalist(elementId, items) {
        const dl = document.getElementById(elementId);
        dl.innerHTML = '';
        (items || []).forEach(item => { dl.innerHTML += `<option value="${item}">`; });
    }

    function addDeviceRow() {
        const container = document.getElementById('devicesContainer');
        const rowId = 'dev_' + Date.now() + Math.random().toString(36).substr(2, 4);
        
        const html = `
            <div class="device-row" id="${rowId}">
                <i class="fa-solid fa-circle-xmark remove-device-btn" onclick="removeDeviceRow('${rowId}')"></i>
                <div class="grid-2">
                    <div class="form-group" style="margin:0;">
                        <label>Make / Item *</label>
                        <input type="text" class="dev-make" list="listMakes" placeholder="Desktop, Printer, UPS...">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label>Model Name</label>
                        <input type="text" class="dev-model" list="listModels" placeholder="M2170, Veriton...">
                    </div>
                </div>
                <div class="form-group" style="margin:10px 0 0 0;">
                    <label>Serial Number (Unique) *</label>
                    <!-- 🔍 list="listSerials" ADDED BELOW FOR AUTOFETCH SUGGESTIONS -->
                    <input type="text" class="dev-serial" list="listSerials" placeholder="Select or Type Serial No" style="font-family:monospace; font-weight:bold;" oninput="validateSerialInput(this)">
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', html);
    }

    function removeDeviceRow(rowId) {
        const rows = document.querySelectorAll('.device-row');
        if(rows.length <= 1) return Swal.fire('Notice', 'At least one device is required.', 'info');
        const el = document.getElementById(rowId);
        if(el) el.remove();
    }

    function validateSerialInput(inputEl) {
        const serial = inputEl.value.trim().toUpperCase();
        if(!serial) {
            inputEl.classList.remove('duplicate-error');
            return true;
        }

        if(existingSerials.has(serial)) {
            inputEl.classList.add('duplicate-error');
            return false;
        }

        const serialInputs = document.querySelectorAll('.dev-serial');
        let count = 0;
        serialInputs.forEach(inp => {
            if(inp.value.trim().toUpperCase() === serial) count++;
        });

        if(count > 1) {
            inputEl.classList.add('duplicate-error');
            return false;
        }

        inputEl.classList.remove('duplicate-error');
        return true;
    }

    async function saveAssetEntry() {
        const courtId = document.getElementById('inputCourt').value;
        const staff = document.getElementById('inputStaff').value.trim();
        const desig = document.getElementById('inputDesig').value.trim();
        const installDate = document.getElementById('inputInstallDate').value;
        const omNo = document.getElementById('inputOmNo').value.trim();

        const wStart = document.getElementById('inputWStart').value;
        const wEnd = document.getElementById('inputWEnd').value;
        const amcStart = document.getElementById('inputAmcStart').value;
        const amcEnd = document.getElementById('inputAmcEnd').value;

        if(!courtId) return Swal.fire('Required', 'Please select Court Jurisdiction.', 'error');
        if(!staff) return Swal.fire('Required', 'Staff Name is required.', 'error');

        const deviceRows = document.querySelectorAll('.device-row');
        let devices = [];
        let hasDuplicate = false;
        let invalidSerialName = '';

        deviceRows.forEach(row => {
            const make = row.querySelector('.dev-make').value.trim();
            const model = row.querySelector('.dev-model').value.trim();
            const serialInput = row.querySelector('.dev-serial');
            const serial = serialInput.value.trim().toUpperCase();

            if(!serial) return;

            if(!validateSerialInput(serialInput)) {
                hasDuplicate = true;
                invalidSerialName = serial;
            }

            devices.push({ make, model, serial });
        });

        if(devices.length === 0) return Swal.fire('Required', 'Please fill at least one device Serial Number.', 'error');

        if(hasDuplicate) {
            return Swal.fire('Duplicate Serial Number!', `Serial Number <b>"${invalidSerialName}"</b> already exists in the system!`, 'error');
        }

        devices.forEach(d => existingSerials.add(d.serial));

        postToScript({ 
            action: 'saveMultiAssets', 
            page: courtId, 
            staff, desig, installDate, omNo, devices,
            wStart, wEnd, amcStart, amcEnd
        });

        Swal.fire({
            icon: 'success',
            title: 'Allotment Saved!',
            text: 'Hardware entry submitted successfully.',
            timer: 2000,
            showConfirmButton: false
        });

        // Reset Form
        document.getElementById('inputStaff').value = "";
        document.getElementById('inputDesig').value = "";
        document.getElementById('inputInstallDate').value = "";
        document.getElementById('inputOmNo').value = "";
        document.getElementById('inputWStart').value = "";
        document.getElementById('inputWEnd').value = "";
        document.getElementById('inputAmcStart').value = "";
        document.getElementById('inputAmcEnd').value = "";
        document.getElementById('devicesContainer').innerHTML = "";
        addDeviceRow();
    }
</script>

</body>
</html>
